# Local-only override (do NOT commit). Points the prod stack at an
# isolated pg_dump copy of the dev Postgres: database `ezcorp_prodtest`
# on the host's published :5432. The live dev `ezcorp` DB is untouched.
#
# Usage:
#   docker compose --env-file .env.prod \
#     -f compose.prod.yml -f compose.prod.devdb.yml up -d
#
# Revert to embedded PGlite: bring the stack up again WITHOUT the second
# -f (and `docker compose -f compose.prod.yml up -d --force-recreate`).
services:
  app:
    # Linux needs this for host.docker.internal to resolve to the docker
    # host gateway so the container can reach the dev PG on host :5432.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Switches the app from embedded PGlite to external Postgres
      # (Bun.sql). Not present in compose.prod.yml's env map, so this
      # key-merges cleanly with no override conflict.
      DATABASE_URL: "postgres://ezcorp:ezcorp@host.docker.internal:5432/ezcorp_prodtest"

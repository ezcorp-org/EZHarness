name: ci

# Bun is PINNED (not "latest") in every job: an unannounced bun release can
# change install/test semantics under us — bun 1.3.14's isolated linker broke
# cold-cache `--frozen-lockfile` installs until the @types devDeps fix.
# 1.3.14 verified green 2026-06-11 (full local job sweep + cold-cache
# clean-clone install). Bump deliberately, with a local re-verification.
#
# The pinned bun version + the shared dependency cache live in the composite
# action .github/actions/setup. Bump the pin there (its `bun-version` default)
# AND in the two jobs below that call setup-bun directly (gate-integrity,
# coverage, visual-evidence — they install no deps, so they skip the composite).
#
# SPEED/COST SHAPE (see scripts/test-coverage.sh + scripts/lib/test-file-sets.sh):
# the backend suite used to run TWICE — once plain for pass/fail (`Backend
# tests`, ~19 min) and once instrumented for coverage (`Per-file coverage gate`,
# ~24 min). It now runs ONCE, sharded across `cov-shard` runners that gate
# pass/fail AND emit coverage in a single pass; the two required checks `Backend
# tests` and `Per-file coverage gate` are thin aggregators over those shards.
# Every job shares one warm bun cache, and Playwright browsers are cached.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded PR runs (a new push to the same PR branch supersedes the
# in-flight run) to stop paying for stale CI. Main pushes always run to
# completion — the visual-evidence publisher keys off a completed CI run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      # scripts/typecheck.sh runs backend (tsconfig.typecheck.json) + web
      # (svelte-kit sync + scoped tsc). Both currently pass, so this is a
      # hard gate.
      - run: bun run typecheck

  # vitest runs both *.component.test.ts (Svelte DOM) and *.server.test.ts
  # (route-handler unit tests), 2-way sharded for wall clock (per-file costs
  # dominate the 410-file suite). Verified locally: --shard=1/2 + --shard=2/2
  # execute 205+205 = 410 test files / 2330+2068 = 4398 tests — exactly the
  # unsharded run's counts.
  test-web-shard:
    name: Web tests shard ${{ matrix.i }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Keep the /2 divisor in the run step in sync with this list length.
        i: [1, 2]
    steps:
      - uses: actions/checkout@v4
      # Root deps too: web's *.server.test.ts import backend handlers from
      # ../src/**, which pull in root-only deps. The composite installs both.
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - run: cd web && bunx --bun vitest run --shard=${{ matrix.i }}/2

  # Required check (branch protection): thin aggregator that KEEPS the pinned
  # required-check name over the sharded vitest matrix — green iff every
  # shard succeeded (same pattern as the `Backend tests` aggregator below).
  test-web:
    name: Web tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [test-web-shard]
    if: always()
    steps:
      - name: Aggregate vitest shard results
        run: |
          echo "test-web-shard: ${{ needs.test-web-shard.result }}"
          if [ "${{ needs.test-web-shard.result }}" != "success" ]; then
            echo "::error::A vitest shard failed — see the failing shard's log."
            exit 1
          fi
          echo "All vitest shards succeeded."

  # Required check: the ORPHANED web bun-leg pool — plain `web/src/**/*.test.ts`
  # that vitest does NOT match (no .component/.server/.unit suffix) and the
  # backend coverage/passfail pools do NOT already run (~225 files, incl. the 15
  # web/src/__tests__/security/* suites + chat page-handlers + tool-cards).
  # These ran in NO CI job before — silent test-rot. scripts/test-web.sh runs
  # them per-file isolated (mock.module contamination) with REAL exit-code
  # capture (a module-load crash / OOM is a failure, not a false green).
  web-bun-tests:
    name: Web tests (bun-leg orphans)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - run: bash scripts/test-web.sh

  e2e-mock:
    name: E2E (mock, no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
          playwright: "true"
      # Mock/preview e2e gate. With no DOCKER_TEST the playwright config builds
      # its own preview server (PI_SKIP_INIT=1 build + preview on :4173) and the
      # specs hit MOCKED backends — no Docker, no live container, no seed.
      #
      # SCOPED to a stable, preview-runnable spec set (NOT a blanket
      # `playwright test`): the file-organizer + Hub + extension-library/detail
      # surface. A blanket run pulls in ~240 specs, many DOCKER_TEST-gated or
      # seed-dependent that would fail/flake here with no live backend.
      # file-organizer-real.spec.ts self-skips its real-backend cases.
      #
      # ANCHORED regexes (Playwright CLI file args are regexes): a bare
      # `hub.spec.ts` also substring-matched github-projects-hub.spec.ts and
      # project-hub.spec.ts, silently pulling both into this blocking gate.
      # Exactly these 5 files run (verified via --list); the two accidental
      # extras are out of the gate and belong to the future lane manifest.
      - run: |
          cd web && bunx playwright test --project=chromium \
            'e2e/file-organizer-hub\.spec\.ts$' \
            'e2e/file-organizer-real\.spec\.ts$' \
            'e2e/hub\.spec\.ts$' \
            'e2e/extensions-library-tabs\.spec\.ts$' \
            'e2e/extension-detail-pages\.spec\.ts$'
      # Post-mortem debuggability: keep traces/screenshots when the gate fails.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-mock-test-results
          path: web/test-results/
          retention-days: 3
          if-no-files-found: ignore

  # Real-auth + real-DB + mock-LLM e2e tier (web/playwright.real.config.ts,
  # specs under web/e2e/real-auth/). Unlike e2e-mock, the preview server boots
  # WITHOUT PI_SKIP_INIT — the DB initialises, auth runs end-to-end, and the
  # deterministic /api/__test/* determinism surface is opted-in. This is the
  # only tier that proves the integrated auth + harness-control + extension
  # seams (CRIT-2: previously wired to no workflow).
  #
  # BLOCKING gate. Two of the specs (extension-author-flow,
  # extension-control-flow) spawn a REAL extension subprocess via the sandbox
  # (`prlimit` + Landlock). On GitHub hosted runners the tier resolves to
  # `landlock` and the jail engages; setup-bun's `bun` (under `~/.bun/bin`) is
  # outside the conventional read-exec dirs, but the sandbox now grants the Bun
  # runtime's own bin-dir (`runtimeExecRoDirs`, issue #55), so the jailed
  # `prlimit … bun` execvp succeeds and those two specs RUN and gate here — no
  # longer skipped on hosted runners. They stay `test.skip(() =>
  # !sandboxSpawnAvailable(), …)`-gated via a real spawn probe
  # (web/e2e/real-auth/sandbox-probe.ts → _sandbox-spawn-probe.bun.ts, which
  # runs the actual tier probe + jail wrap around the real `prlimit + bun`
  # chain): a genuine loss of spawn capability skips them cleanly rather than
  # red-flaking, and the fail-fast step below turns that silent skip into a hard
  # job failure so the two specs can never quietly drop out.
  e2e-real-auth:
    name: E2E (real auth + real DB)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
          playwright: "true"
      # Fail fast if the sandbox can't spawn here — otherwise the two extension
      # specs would silently skip and the job would go green without them (#55).
      - run: bun web/e2e/real-auth/_sandbox-spawn-probe.bun.ts
      - run: cd web && PI_E2E_REAL=1 bunx playwright test --config playwright.real.config.ts
      # Post-mortem debuggability: keep traces/screenshots when the gate fails
      # (the real config uses trace: retain-on-failure).
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-real-auth-test-results
          path: web/test-results/
          retention-days: 3
          if-no-files-found: ignore

  lint:
    name: Lint (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Biome lint is a hard gate. Warnings and infos remain visible
      # (`bun run lint` exits 0 on them) so we can chip away without blocking CI.
      - run: bun run lint

  manifest-lock:
    name: Manifest lockfile drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Re-derives manifest.lock.json from the bundled extensions' ezcorp.config.ts
      # files and exits non-zero if the on-disk lockfile differs. To fix locally:
      #   bun run scripts/regenerate-manifest-lock.ts
      - run: bun run scripts/regenerate-manifest-lock.ts --check

  gate-integrity:
    name: Gate integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # fetch-depth: 0 + an explicit fetch of main so the diff-scoped checks
      # can compute `origin/main...HEAD` (PR checkouts are otherwise shallow).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: git fetch --no-tags origin main
      # Anti-tamper / anti-cheat meta-check (no deps needed). A maintainer-only
      # `gate-change-approved` label sets GATE_CHANGE_APPROVED=1 to bypass.
      - name: Gate-integrity meta-check
        env:
          BASE_REF: origin/main
          GATE_CHANGE_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'gate-change-approved') && '1' || '' }}
        run: bun scripts/gate-integrity.ts

  # ── Backend tests + coverage, sharded into a single per-file pass ──────────
  # Each shard runs a 1-of-N stride slice of the coverage host set under
  # --coverage, gates pass/fail (only for files in the pass/fail set P, with an
  # isolated retry sweep for instrumentation flakes), and uploads its lcov for
  # the coverage gate to merge. See scripts/test-coverage.sh (host-shard mode).
  cov-shard:
    name: Coverage shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Keep SHARD_TOTAL below in sync with this list length.
        # 8 shards: ~1410s of measured test work / 8 ≈ 176s + ~23s fixed
        # overhead per shard ≈ 3:20 wall for the leg (was ~5:34 at 5).
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - name: Run shard (tests + coverage)
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: "8"
          COV_OUT: coverage-shard
        run: bash scripts/test-coverage.sh
      # 3 days (not 1): keeps "Re-run failed jobs" on the coverage gate
      # working >24h after the shards ran.
      - uses: actions/upload-artifact@v4
        with:
          name: lcov-cov-shard-${{ matrix.shard }}
          path: coverage-shard
          retention-days: 3
          if-no-files-found: error

  # SDK + harness-client + node-vitest coverage legs (node 22 for coverage-v8).
  cov-extras:
    name: Coverage extras (legs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      # @vitest/coverage-v8 needs node:inspector's Coverage domain (Bun lacks it).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run coverage legs
        env:
          COVERAGE_LEGS_ONLY: "1"
          COV_OUT: coverage-shard
        run: bash scripts/test-coverage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lcov-cov-extras
          path: coverage-shard
          retention-days: 3 # see the cov-shard retention note
          if-no-files-found: error

  # Coverage producer for the 9 web security helpers un-excluded from
  # scripts/coverage-config.ts. Their bun:test suites use per-`beforeEach`
  # `mock.module` (bun-only), so they can't run in the node/vitest v8 leg;
  # scripts/security-coverage.sh runs them under `bun --coverage` and FILTERS the
  # lcov to exactly those 9 files (no web/src/lib union artifact). Emitted as an
  # `lcov-cov-*` artifact so the `Per-file coverage gate` merges + enforces them.
  web-security-coverage:
    name: Web security coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - name: Run security coverage
        env:
          COV_OUT: coverage-shard
        run: bash scripts/security-coverage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lcov-cov-security
          path: coverage-shard
          retention-days: 3 # see the cov-shard retention note
          if-no-files-found: error

  # Required check: a CURATED set of high-value, deterministic correctness suites
  # gated STRICTLY on pass/fail (RBAC engine + resolver + rbac-RPC, migration
  # idempotency, github-projects concurrency, auth, provider/extension secrets,
  # mention-wiring). Runs PLAIN (no --coverage) via scripts/test.sh's
  # CRITICAL_ONLY mode so it REDS CI on any assertion failure — the correctness
  # gate the coverage shards intentionally don't provide (they tolerate pass/fail
  # because several backend suites are env-flaky under --coverage). Membership is
  # narrow + isolation-deterministic (verified over repeated local runs).
  backend-critical:
    name: Backend critical (strict pass/fail)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - name: Run curated critical set
        env:
          CRITICAL_ONLY: "1"
        run: bash scripts/test.sh

  # The pass/fail files that the coverage shards do NOT run: the *integration*
  # variants excluded from the coverage set, plus route-contract.test.ts (the
  # remote-control governance meta-test). Keeps the union of gated pass/fail
  # files exactly equal to the full pass/fail set P — scripts/test.sh asserts
  # route-contract's membership so set drift can never silently de-gate it.
  residual-tests:
    name: Residual integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          web: "true"
          sync: "true"
      - name: Run residual pass/fail set
        env:
          RESIDUAL_ONLY: "1"
        run: bash scripts/test.sh

  # Required check (branch protection): green iff every backend shard + the
  # residual set succeeded. The shards run the backend suite under --coverage
  # and gate pass/fail on P-membership with an isolated plain retry sweep for
  # instrumentation flakes (see scripts/test-coverage.sh host-shard mode);
  # non-P files (the example suites) stay coverage-only, enforced by the
  # Per-file coverage gate's thresholds. A red here therefore means a real
  # pass/fail-set test failure OR an infrastructure failure (runner couldn't
  # execute) — both must block. Aggregated so the pinned required-check name
  # keeps reporting.
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [cov-shard, residual-tests]
    if: always()
    steps:
      - name: Aggregate shard results
        run: |
          echo "cov-shard:       ${{ needs.cov-shard.result }}"
          echo "residual-tests:  ${{ needs.residual-tests.result }}"
          if [ "${{ needs.cov-shard.result }}" != "success" ] || \
             [ "${{ needs.residual-tests.result }}" != "success" ]; then
            echo "::error::A backend shard failed — a pass/fail-set (P) test failure that survived the isolated retry, or an infrastructure failure. See the failing shard's log."
            exit 1
          fi
          echo "All backend shards succeeded."

  # Required check (branch protection): merges every shard + extras lcov and
  # enforces scripts/coverage-thresholds.json + the diff-scoped new-file/patch
  # gates. No `bun install` — the gate scripts use only bun + node: builtins.
  coverage:
    name: Per-file coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [cov-shard, cov-extras, web-security-coverage]
    if: always()
    steps:
      - name: Require coverage producers to have succeeded
        run: |
          if [ "${{ needs.cov-shard.result }}" != "success" ] || \
             [ "${{ needs.cov-extras.result }}" != "success" ] || \
             [ "${{ needs.web-security-coverage.result }}" != "success" ]; then
            echo "::error::coverage producers failed — coverage data is incomplete"
            exit 1
          fi
      # fetch-depth: 0 + fetch main so the new-file / patch gates can diff
      # origin/main...HEAD against the merged lcov.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: git fetch --no-tags origin main
      - uses: actions/download-artifact@v4
        with:
          pattern: lcov-cov-*
          path: coverage-artifacts
          merge-multiple: true
      - name: Merge lcov + enforce thresholds
        run: |
          mkdir -p coverage
          bun scripts/merge-lcov.ts "coverage-artifacts/*.info" coverage/lcov.info
          bun scripts/check-coverage.ts
      - name: New-file coverage gate
        env:
          BASE_REF: origin/main
        run: bun scripts/check-new-file-coverage.ts
      - name: Patch coverage gate
        env:
          BASE_REF: origin/main
        run: bun scripts/check-patch-coverage.ts

  visual-evidence:
    # WF1 of the visual-evidence feature. SECURITY: this job runs UNTRUSTED PR
    # code (the captured @evidence specs), so it MUST stay contents:read and
    # never hold a write token. The privileged publish step lives in the
    # separate `visual-evidence-publish.yml` (on: workflow_run).
    #
    # The job conclusion is the HARD gate (step "Visual-evidence gate"); every
    # later step is continue-on-error so the best-effort capture/publish lane
    # can never red a PR during the fail-soft pilot.
    #
    # Capture is DIFF-SCOPED (scripts/visual-evidence/select-specs.ts):
    # selection = changed @evidence-TAGGED specs ∪ covers-map specs rendering
    # the changed visual files. A non-visual diff (incl. changed but
    # non-@evidence specs, and pushes to main whose base...HEAD diff is empty)
    # skips capture and uploads a `skipped` marker manifest — WF2 refreshes a
    # stale gallery comment but never creates one. A changed visual file with
    # no covers entry (or an unloadable covers map) falls open to the FULL
    # @evidence suite so the change is still rendered by something.
    name: Visual evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: visual-evidence-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - name: Cache bun global install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-1.3.14-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-1.3.14-
      - run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref || 'main' }}"
      - run: bun install --frozen-lockfile
      # HARD gate (required, deterministic, NO browser): fails the PR if a
      # visual-surface file changed without a matching @evidence e2e spec. The
      # maintainer-only `evidence-exempt` label sets EVIDENCE_EXEMPT=1 to bypass.
      - name: Visual-evidence gate
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
          EVIDENCE_EXEMPT: ${{ contains(github.event.pull_request.labels.*.name, 'evidence-exempt') && '1' || '' }}
        run: bun scripts/check-visual-evidence.ts
      # SOFT capture (best-effort): only the @evidence-tagged specs run. Browser
      # binaries are cached to skip the ~150 MB chromium download.
      - name: Cache Playwright browsers
        id: pw-cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      # SOFT capture (best-effort), DIFF-SCOPED: select-specs.ts decides which
      # @evidence specs to run from the base...HEAD diff. __NONE__ (non-visual
      # diff, incl. main pushes) skips the browser install entirely. Derived
      # spec paths flow through a file, never a ${{ }} interpolation, so an
      # attacker-controlled path can't inject into the run script. Browser
      # binaries are cached above to skip the ~150 MB chromium download.
      - name: Capture visual evidence
        id: capture
        continue-on-error: true
        # Step-level cap: a hung capture is absorbed by continue-on-error
        # instead of tripping the 20m JOB timeout and redding this fail-soft
        # lane — the deterministic gate step stays the only red path.
        timeout-minutes: 12
        # Explicit bash (the Actions default, but pinned so the array logic
        # below is never run under another shell — it also works in zsh for
        # local reproduction, unlike the previous `mapfile`).
        shell: bash
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
          # Split install (see .github/actions/setup): apt deps only on a
          # browser-cache miss. Empty/errored cache output reads as "miss",
          # so deps still install (fail-safe direction).
          PW_BROWSER_CACHE_HIT: ${{ steps.pw-cache.outputs.cache-hit }}
        run: |
          SPECS_FILE="$RUNNER_TEMP/evidence-specs.txt"
          bun scripts/visual-evidence/select-specs.ts > "$SPECS_FILE" || echo __ALL__ > "$SPECS_FILE"
          [ -s "$SPECS_FILE" ] || echo __ALL__ > "$SPECS_FILE"
          if grep -qx '__NONE__' "$SPECS_FILE"; then
            # Single source of truth for "capture was skipped": this step
            # output. The manifest step turns it into a `skipped` marker
            # manifest (so WF2 can refresh a stale gallery) instead of
            # re-parsing the sentinel file.
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            echo "non-visual diff — skipping visual-evidence capture"
            exit 0
          fi
          cd web && bun install --frozen-lockfile
          bunx --bun svelte-kit sync
          bunx playwright install chromium
          if [ "${PW_BROWSER_CACHE_HIT:-}" != "true" ]; then
            bunx playwright install-deps chromium
          fi
          if grep -qx '__ALL__' "$SPECS_FILE"; then
            EZCORP_E2E_EVIDENCE=1 bunx playwright test --project=chromium --grep @evidence || true
          else
            SPECS=()
            # `|| [ -n "$line" ]` keeps a final line with no trailing newline (mapfile-equivalent robustness; select-specs always emits a trailing \n today, this guards a future producer change).
            while IFS= read -r line || [ -n "$line" ]; do [ -n "$line" ] && SPECS+=("$line"); done < "$SPECS_FILE"
            EZCORP_E2E_EVIDENCE=1 bunx playwright test --project=chromium --grep @evidence "${SPECS[@]}" || true
          fi
      # When capture was skipped (non-visual diff), the manifest is a `skipped`
      # marker with zero shots: WF2 uses it to REFRESH a stale gallery comment
      # from an earlier visual push (update-only — it never creates a comment),
      # so screenshots never outlive the change they depicted. A capture that
      # RAN but produced no shots writes a plain empty manifest instead, so the
      # ⚠️ comment keeps flagging genuinely broken captures.
      - name: Build evidence manifest
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
          EVIDENCE_MANIFEST: web/blob-report/manifest.json
          EVIDENCE_SKIPPED: ${{ steps.capture.outputs.skipped }}
        run: bun scripts/visual-evidence/build-manifest.ts
      - name: Upload visual evidence
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-evidence
          path: web/blob-report
          retention-days: 3
          if-no-files-found: ignore

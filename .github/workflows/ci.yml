name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # scripts/typecheck.sh runs backend (tsconfig.typecheck.json) + web
      # (svelte-kit sync + scoped tsc). Both currently pass, so this is a
      # hard gate.
      - run: bun run typecheck

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # scripts/test.sh runs each src/__tests__ file in its own bun process
      # (PARALLEL=6) so mock.module() doesn't leak across files.
      - run: bun run test

  test-web:
    name: Web tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: cd web && bun install --frozen-lockfile
      # SvelteKit ./$types codegen so server tests resolve route types.
      - run: cd web && bunx --bun svelte-kit sync
      # vitest runs both *.component.test.ts (Svelte DOM) and
      # *.server.test.ts (route-handler unit tests).
      - run: cd web && bunx --bun vitest run

  lint:
    name: Lint (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Biome lint is a hard gate: all 13 pre-existing errors were burned
      # down in the same wave that flipped this job. Warnings and infos
      # remain visible (`bun run lint` exits 0 on them) so we can chip
      # away at them without blocking CI.
      - run: bun run lint

  manifest-lock:
    name: Manifest lockfile drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Phase post-perm-cleanup: re-derives manifest.lock.json from the
      # bundled extensions' ezcorp.config.ts files and exits non-zero
      # if the on-disk lockfile differs. Closes the loop where a PR that
      # edits an ezcorp.config.ts forgets to commit the regenerated
      # lockfile. To fix locally:
      #   bun run scripts/regenerate-manifest-lock.ts
      - run: bun run scripts/regenerate-manifest-lock.ts --check

name: ci

# Bun is PINNED (not "latest") in every job: an unannounced bun release can
# change install/test semantics under us — bun 1.3.14's isolated linker broke
# cold-cache `--frozen-lockfile` installs until the @types devDeps fix.
# 1.3.14 verified green 2026-06-11 (full local job sweep + cold-cache
# clean-clone install). Bump deliberately, with a local re-verification.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # scripts/typecheck.sh runs backend (tsconfig.typecheck.json) + web
      # (svelte-kit sync + scoped tsc). Both currently pass, so this is a
      # hard gate.
      - run: bun run typecheck

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: bun install --frozen-lockfile
      # scripts/test.sh runs each src/__tests__ file in its own bun process
      # (PARALLEL=6) so mock.module() doesn't leak across files.
      - run: bun run test

  test-web:
    name: Web tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      # Root deps too: web's *.server.test.ts import backend handlers from
      # ../src/**, which pull in root-only deps (drizzle-orm, pi-ai). Without
      # this, vitest fails to resolve those imports. (web/ is not a workspace
      # member of the root, so its install doesn't cover them.)
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # SvelteKit ./$types codegen so server tests resolve route types.
      - run: cd web && bunx --bun svelte-kit sync
      # vitest runs both *.component.test.ts (Svelte DOM) and
      # *.server.test.ts (route-handler unit tests).
      - run: cd web && bunx --bun vitest run

  e2e-mock:
    name: E2E (mock, no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      # Same install shape as test-web: web specs pull route handlers from
      # ../src/**, so the root deps must be present too.
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # SvelteKit ./$types codegen so the preview build resolves route types.
      - run: cd web && bunx --bun svelte-kit sync
      # Chromium only — the scoped specs below all target the desktop project.
      - run: cd web && bunx playwright install --with-deps chromium
      # Mock/preview e2e gate. With no DOCKER_TEST the playwright config builds
      # its own preview server (PI_SKIP_INIT=1 build + preview on :4173) and the
      # specs hit MOCKED backends — no Docker, no live container, no seed.
      #
      # SCOPED to a stable, preview-runnable spec set (NOT a blanket
      # `playwright test`): the file-organizer + Hub + extension-library/detail
      # surface. A blanket run pulls in ~240 specs, many of which are
      # DOCKER_TEST-gated (real-auth/*, deterministic-ext-gate, the SEND-flow
      # chat specs) or seed-dependent and would fail/flake here with no live
      # backend. This job gates UI rendering + action wiring against mocked
      # backends; it does NOT gate the real subprocess/daemon/validator (that is
      # the DOCKER_TEST=1 path, run separately). file-organizer-real.spec.ts is
      # included but self-skips its real-backend cases without DOCKER_TEST.
      - run: |
          cd web && bunx playwright test --project=chromium \
            file-organizer-hub.spec.ts \
            file-organizer-real.spec.ts \
            hub.spec.ts \
            extensions-library-tabs.spec.ts \
            extension-detail-pages.spec.ts

  lint:
    name: Lint (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: bun install --frozen-lockfile
      # Biome lint is a hard gate: all 13 pre-existing errors were burned
      # down in the same wave that flipped this job. Warnings and infos
      # remain visible (`bun run lint` exits 0 on them) so we can chip
      # away at them without blocking CI.
      - run: bun run lint

  manifest-lock:
    name: Manifest lockfile drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: bun install --frozen-lockfile
      # Phase post-perm-cleanup: re-derives manifest.lock.json from the
      # bundled extensions' ezcorp.config.ts files and exits non-zero
      # if the on-disk lockfile differs. Closes the loop where a PR that
      # edits an ezcorp.config.ts forgets to commit the regenerated
      # lockfile. To fix locally:
      #   bun run scripts/regenerate-manifest-lock.ts
      - run: bun run scripts/regenerate-manifest-lock.ts --check

  gate-integrity:
    name: Gate integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # fetch-depth: 0 + an explicit fetch of main so the diff-scoped checks
      # can compute `origin/main...HEAD` (PR checkouts are otherwise shallow).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: git fetch --no-tags origin main
      # Anti-tamper / anti-cheat meta-check: fails the PR if it weakens the
      # gate (EXCLUDES growth, threshold ratchet) or fakes tests green
      # (.skip/.only/.todo, empty catch{}, assertion-free test blocks, a
      # committed lcov). A maintainer-only `gate-change-approved` label sets
      # GATE_CHANGE_APPROVED=1 to bypass for legitimate gate changes — an
      # agent's token cannot apply a restricted label.
      - name: Gate-integrity meta-check
        env:
          BASE_REF: origin/main
          GATE_CHANGE_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'gate-change-approved') && '1' || '' }}
        run: bun scripts/gate-integrity.ts

  coverage:
    name: Per-file coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # fetch-depth: 0 + fetch main so the new-file / patch-coverage gates can
      # diff origin/main...HEAD against the just-built lcov.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      # scripts/test-coverage.sh runs a node-vitest --coverage leg for the
      # vitest-only web/src/lib files (deep-link-resolve + goal-row-logic +
      # GoalPill). @vitest/coverage-v8 needs node:inspector's Coverage domain,
      # which Bun does not implement — so node 22 MUST be provisioned before
      # the gate runs. Mirrors release-sdk.yml's setup-node step.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: cd web && bun install --frozen-lockfile
      # SvelteKit ./$types codegen so the vitest leg resolves route types.
      - run: cd web && bunx --bun svelte-kit sync
      - run: git fetch --no-tags origin main
      # Per-file coverage gate: bun host/example/web shards + SDK bundle +
      # node-vitest leg, merged into coverage/lcov.info and checked against
      # scripts/coverage-thresholds.json. Phase 66 search helpers + the two
      # reconciled vitest-only component pins are enforced here on every PR.
      - run: bun run test:coverage
      # Diff-scoped gates that reuse the lcov this job just built (so we don't
      # pay to build it twice). New-file gate: every source file ADDED in the
      # PR must be measured AND matched by a threshold key (closes the
      # "silently un-gated new file" hole). Patch coverage: every changed
      # executable line must be covered.
      - name: New-file coverage gate
        env:
          BASE_REF: origin/main
        run: bun scripts/check-new-file-coverage.ts
      - name: Patch coverage gate
        env:
          BASE_REF: origin/main
        run: bun scripts/check-patch-coverage.ts

  visual-evidence:
    # WF1 of the visual-evidence feature. SECURITY: this job runs UNTRUSTED PR
    # code (the captured @evidence specs), so it MUST stay contents:read and
    # never hold a write token. The privileged publish step lives in the
    # separate `visual-evidence-publish.yml` (on: workflow_run), which executes
    # from the default branch and never checks out PR code.
    #
    # This is the ONLY required check of the feature. The job conclusion is the
    # HARD gate (step "Visual-evidence gate"); every later step is
    # continue-on-error so the best-effort capture/publish lane can never red a
    # PR during the fail-soft pilot.
    name: Visual evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Always runs (no job-level if:, no paths filter) so the required-check
    # context always reports. Keyed on PR number (or ref on non-PR events).
    concurrency:
      group: visual-evidence-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      # fetch-depth: 0 + an explicit fetch of the PR base so the gate can
      # compute `origin/<base>...HEAD` (PR checkouts are otherwise shallow).
      # Mirrors the proven block in the gate-integrity / coverage jobs, but
      # parameterizes the base ref instead of hardcoding main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # see pin note at top of file
      - run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref || 'main' }}"
      - run: bun install --frozen-lockfile
      # HARD gate (required, deterministic, NO browser): fails the PR if a
      # visual-surface file changed without a matching @evidence e2e spec. The
      # maintainer-only `evidence-exempt` label sets EVIDENCE_EXEMPT=1 to bypass
      # (mirrors the gate-change-approved env-wiring above) — an agent's token
      # cannot apply a restricted label.
      - name: Visual-evidence gate
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref || 'main' }}
          EVIDENCE_EXEMPT: ${{ contains(github.event.pull_request.labels.*.name, 'evidence-exempt') && '1' || '' }}
        run: bun scripts/check-visual-evidence.ts
      # SOFT capture (best-effort): only the @evidence-tagged specs run, with
      # EZCORP_E2E_EVIDENCE=1 so the captureEvidence() helper emits PNG
      # attachments into a blob report. When no @evidence spec exists, the
      # --grep selects nothing and Playwright exits 1 with "no tests found";
      # `|| true` tolerates that so this non-blocking lane never reds.
      - name: Capture visual evidence
        continue-on-error: true
        run: |
          cd web && bun install --frozen-lockfile
          bunx --bun svelte-kit sync
          bunx playwright install --with-deps chromium
          EZCORP_E2E_EVIDENCE=1 bunx playwright test --project=chromium --grep @evidence || true
      # Build the trusted manifest (sanitizes spec/label, decodes + extracts the
      # inline PNGs) from web/blob-report. PR/head/run metadata via env.
      # Write the manifest INSIDE web/blob-report so the uploaded artifact has a
      # single root: the manifest's `file` paths (extracted/<name>.png, relative
      # to the blob dir) then resolve correctly when the publisher reads them
      # from the downloaded artifact. (Uploading web/blob-report + manifest.json
      # as two paths would root the archive at the repo and break that join.)
      - name: Build evidence manifest
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
          EVIDENCE_MANIFEST: web/blob-report/manifest.json
        run: bun scripts/visual-evidence/build-manifest.ts
      # Upload the blob report (manifest.json + extracted/ PNGs live inside it)
      # for the privileged publisher (WF2) to download by run-id. A single path
      # roots the archive at web/blob-report so manifest `file` paths resolve.
      # retention-days: 3 — evidence is ephemeral.
      - name: Upload visual evidence
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-evidence
          path: web/blob-report
          retention-days: 3
          if-no-files-found: ignore

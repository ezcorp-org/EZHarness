name: release-image

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release for the app-v* tag
  packages: write

jobs:
  build-and-push:
    name: Verify then publish Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast — before the expensive build — if the tag and the version
      # baked into the image (package.json) disagree. Keeps `current` (from
      # the image) and `latest` (from the Release we publish below) in sync.
      # See docs/update-check.md → "Releasing a new version".
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/app-v')
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME#app-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (version ${TAG_VERSION}) does not match package.json version ${PKG_VERSION}. Bump package.json to ${TAG_VERSION} (or re-tag) so the running image and the GitHub Release agree."
            exit 1
          fi
          echo "Tag matches package.json version: ${PKG_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      # ── Gate 1: fast in-process verification ───────────────────────────
      # Catches regressions in the snapshot/rollback/circuit-breaker logic
      # before we spend minutes on a Docker build.

      - name: Unit tests (db/backup, readiness, update-check, migrate idempotency, encryption)
        run: bun test ./src/__tests__/db-backup.test.ts ./src/__tests__/readiness.test.ts ./src/__tests__/update-check.test.ts ./src/__tests__/db-migrate-idempotent.test.ts ./src/__tests__/encryption.test.ts

      - name: Web unit tests (API endpoint + UpdateBanner logic)
        run: cd web && bun test ./src/__tests__/api-ready-version.test.ts ./src/__tests__/update-banner-logic.test.ts

      - name: Verify snapshot + rollback happy path
        run: bun run verify:backup

      - name: Verify circuit-breaker edge cases
        run: bun run verify:edges

      # ── Gate 2: Docker smoke + rollback ────────────────────────────────
      # Build once with load:true so the image is available to the verify
      # scripts (--no-build reuses the existing ezcorp:verify tag). The final
      # push step re-invokes build-push-action; buildx caching makes the
      # second build effectively instant.

      - name: Derive build args
        id: args
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build image locally for verification (load into daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ezcorp:verify
          build-args: |
            VERSION=${{ steps.args.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.args.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image (labels, VOLUME, readiness, version)
        env:
          # Re-use the same VERSION/REVISION/CREATED that were baked into the
          # image above so label assertions match. Without these overrides the
          # script falls back to its local defaults (e.g. 0.1.0-verify) which
          # would never match a CI-built image.
          VERIFY_VERSION: ${{ steps.args.outputs.version }}
          VERIFY_REVISION: ${{ github.sha }}
          VERIFY_CREATED: ${{ steps.args.outputs.created }}
        run: bash scripts/verify-docker-image.sh --no-build

      - name: Verify Docker rollback flow (circuit breaker + recovery)
        run: bash scripts/verify-docker-rollback.sh

      - name: Verify Docker two-image upgrade (data + snapshot preservation)
        run: bash scripts/verify-docker-upgrade.sh

      # ── Publish ────────────────────────────────────────────────────────

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract publish metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ezcorp
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/app-v') }}
            type=match,pattern=app-v(.*),group=1
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            type=sha,prefix=sha-,format=short

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.args.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.args.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Announce ─────────────────────────────────────────────────────────
      # Publish the GitHub Release for this app-v* tag and mark it "Latest".
      # The in-app update check polls `releases/latest`, so this is the step
      # that makes deployed instances aware a new version exists. Runs only on
      # tag pushes (workflow_dispatch has no tag) and only after the image is
      # successfully pushed. Idempotent on re-run.
      # See docs/update-check.md → "Releasing a new version".
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/app-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — ensuring it is marked Latest."
            gh release edit "$TAG" --latest --verify-tag
          else
            echo "Creating release ${TAG}."
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest \
              --verify-tag
          fi

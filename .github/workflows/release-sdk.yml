name: release-sdk

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Publish @ezcorp/sdk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: detect
        run: |
          PREV=$(git show HEAD~1:packages/@ezcorp/sdk/package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          CURR=$(jq -r .version packages/@ezcorp/sdk/package.json)
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"
          if [ "$PREV" != "$CURR" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Version bump detected: $PREV -> $CURR"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No version change detected ($CURR). Publish will be skipped unless workflow_dispatch."
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish + .npmrc)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        run: bun run test

      - name: Run coverage
        run: bun run test:coverage

      - name: Build SDK
        run: bun run --cwd packages/@ezcorp/sdk build

      - name: Publish to npm (with provenance)
        if: github.event_name == 'workflow_dispatch' || steps.detect.outputs.bumped == 'true'
        working-directory: packages/@ezcorp/sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

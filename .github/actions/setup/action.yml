name: "Setup bun + cached deps"
description: >
  Pinned bun, a cached global install cache, root (and optionally web/) deps,
  optional svelte-kit sync, and optional cached Playwright chromium. Centralises
  the bun version pin and the dependency-cache wiring so every CI job shares one
  warm cache instead of cold-installing the 1.6 GB tree nine times.

inputs:
  bun-version:
    description: "Pinned bun version (see the pin note in ci.yml)."
    default: "1.3.14"
  web:
    description: "Also run `bun install` in web/."
    default: "false"
  sync:
    description: "Run `svelte-kit sync` in web/ (needs web deps)."
    default: "false"
  playwright:
    description: "Install Playwright chromium (browser binaries cached)."
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    # Bun's global module cache — keyed on both lockfiles so a dep bump busts it,
    # restore-keys lets an unchanged-deps push reuse the previous run's cache.
    # This skips the package DOWNLOAD/extract on every job; `bun install` still
    # links node_modules but that is far cheaper than a cold fetch.
    - name: Cache bun global install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ inputs.bun-version }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ inputs.bun-version }}-

    - name: Install root deps
      shell: bash
      run: bun install --frozen-lockfile

    - name: Install web deps
      if: inputs.web == 'true'
      shell: bash
      run: cd web && bun install --frozen-lockfile

    - name: SvelteKit sync
      if: inputs.sync == 'true'
      shell: bash
      run: cd web && bunx --bun svelte-kit sync

    # Cache the downloaded browser binaries (~150 MB). `playwright install
    # --with-deps` is still run below — it skips the download on a cache hit but
    # always installs the apt system libs (which aren't cached).
    - name: Cache Playwright browsers
      if: inputs.playwright == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright chromium
      if: inputs.playwright == 'true'
      shell: bash
      run: cd web && bunx playwright install --with-deps chromium

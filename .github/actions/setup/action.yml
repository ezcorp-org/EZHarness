name: "Setup bun + cached deps"
description: >
  Pinned bun, a cached global install cache, root (and optionally web/) deps,
  optional svelte-kit sync, and optional cached Playwright chromium. The bun
  pin itself is SINGLE-SOURCED in the top-level `.bun-version` file (read via
  setup-bun's `bun-version-file`); the dependency-cache wiring lives here so
  every CI job shares one warm cache instead of cold-installing the 1.6 GB
  tree nine times.

inputs:
  web:
    description: "Also run `bun install` in web/."
    default: "false"
  sync:
    description: "Run `svelte-kit sync` in web/ (needs web deps)."
    default: "false"
  playwright:
    description: "Install Playwright chromium (browser binaries cached)."
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version # the single pin source; see ci.yml pin note

    # Bun's global module cache — keyed on both lockfiles so a dep bump busts it,
    # restore-keys lets an unchanged-deps push reuse the previous run's cache.
    # This skips the package DOWNLOAD/extract on every job; `bun install` still
    # links node_modules but that is far cheaper than a cold fetch.
    - name: Cache bun global install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('.bun-version') }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-${{ hashFiles('.bun-version') }}-

    - name: Install root deps
      shell: bash
      run: bun install --frozen-lockfile

    - name: Install web deps
      if: inputs.web == 'true'
      shell: bash
      run: cd web && bun install --frozen-lockfile

    - name: SvelteKit sync
      if: inputs.sync == 'true'
      shell: bash
      run: cd web && bunx --bun svelte-kit sync

    # Cache the downloaded browser binaries (~150 MB).
    - name: Cache Playwright browsers
      if: inputs.playwright == 'true'
      id: pw-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    # Split from `install --with-deps`: `install chromium` is a no-op on a
    # browser-cache hit, and the ~30-60s `install-deps` apt run only happens
    # on a cache MISS (each browser-version bump misses and refreshes the
    # libs). DRIFT RISK accepted: runner-image apt libs aren't cached, so if
    # a GitHub image update ever drops a lib chromium needs while the browser
    # cache still hits, launches fail — bust the playwright-* cache (or bump
    # the browser) to force a deps reinstall.
    - name: Install Playwright chromium
      if: inputs.playwright == 'true'
      shell: bash
      run: cd web && bunx playwright install chromium

    - name: Install Playwright system deps (browser-cache miss only)
      if: inputs.playwright == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
      shell: bash
      run: cd web && bunx playwright install-deps chromium

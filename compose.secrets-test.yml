# NON-COMMITTED test override — isolated ports so live :3000/:5432 stay up.
services:
  postgres:
    ports: !override
      - "15432:5432"
  app:
    environment:
      - DATABASE_URL=postgres://ezcorp:ezcorp@localhost:15432/ezcorp
      - EZCORP_PORT=13111
      - PORT=13111
    command: ["sh", "-lc", "cd /app && bun run dev -- --port 13111"]

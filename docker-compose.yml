services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ezcorp
      POSTGRES_USER: ezcorp
      POSTGRES_PASSWORD: ezcorp
    ports:
      - "5432:5432"
    volumes:
      - testenv-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezcorp"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # `network_mode: host` is dev-only convenience: it lets the dev's
    # browser hit the SvelteKit dev server on localhost without port
    # mapping. Production deployments use isolated container networking
    # (default Docker bridge / Kubernetes NetworkPolicy) — Phase 7's
    # MCP namespace + forward-proxy stack is designed to work alongside
    # that, NOT to depend on host networking. See `docs/deployment.md`
    # §"Container networking" for the production layout.
    network_mode: host
    environment:
      - DATABASE_URL=postgres://ezcorp:ezcorp@localhost:5432/ezcorp
      - EZCORP_PORT=3000
      # ORIGIN must match the URL the browser actually loads — hardcoding
      # `localhost:3000` while the user accesses via Tailscale (or any
      # other hostname) makes SvelteKit's url.origin disagree with the
      # cookie's effective host, which can cascade into "logged out
      # every few minutes" symptoms when the browser scopes the cookie
      # to a domain that subsequent requests don't match. Falls back to
      # localhost for the bare-localhost dev case.
      - ORIGIN=${EZCORP_PUBLIC_URL:-http://localhost:3000}
      - HF_HOME=/app/cache/huggingface
      # Stable encryption keys — credentials survive across re-seeds.
      # Values loaded from .env (gitignored, never committed).
      - EZCORP_ENCRYPTION_SECRET=${EZCORP_ENCRYPTION_SECRET}
      - EZCORP_ENCRYPTION_SALT=${EZCORP_ENCRYPTION_SALT}
      # Stable JWT secret. If unset, src/auth/jwt.ts auto-generates one
      # and stores it (encrypted) in the DB. Any transient
      # decrypt-failure trips the legacy plaintext fallback and silently
      # rotates the secret — every active JWT then fails verification
      # and the user is bounced to /login. Pin explicitly.
      - EZCORP_JWT_SECRET=${EZCORP_JWT_SECRET}
      # Public origin for clickable deep-links in ai-kit tool responses.
      - EZCORP_PUBLIC_URL=${EZCORP_PUBLIC_URL:-}
      # Long-life session for dev parity with prod.
      - EZCORP_SESSION_LIFETIME_DAYS=${EZCORP_SESSION_LIFETIME_DAYS:-180}
      - EZCORP_SESSION_REFRESH_AFTER_DAYS=${EZCORP_SESSION_REFRESH_AFTER_DAYS:-7}
      - EZCORP_SESSION_PREVIOUS_TOKEN_GRACE_SECONDS=${EZCORP_SESSION_PREVIOUS_TOKEN_GRACE_SECONDS:-60}
      # Inverts the EZCorp logo across the UI (splash, login, error pages)
      # so it's obvious at a glance that you're hitting the dev stack and
      # not prod. Read by hooks.server.ts -> transformPageChunk.
      - EZCORP_DEV_INDICATOR=1
      # Zero-setup web search: points the bundled web-search extension at
      # the SearXNG sidecar below. The app is host-network, so Docker DNS
      # names don't resolve for it — use the localhost-published port.
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8889}
      # Composer suggestions: local model endpoint for the prompt-enhancement
      # half (the tool-suggestion half is in-process embeddings and needs no
      # sidecar). Same host-network reasoning as SEARXNG_BASE_URL — use the
      # loopback-published port of the ollama service below. The app degrades
      # gracefully when unreachable (enhancement row hides).
      - EZCORP_SUGGEST_OLLAMA_URL=${EZCORP_SUGGEST_OLLAMA_URL:-http://localhost:11434}
      # 1B-class is the CPU-viable default; GPU boxes can swap in a larger
      # tier (e.g. qwen3:4b) — ollama-init pulls whatever is set here.
      - EZCORP_SUGGEST_MODEL=${EZCORP_SUGGEST_MODEL:-qwen3:1.7b}
      # Self-modification: boot-seeds the 'self' project pointing at this
      # checkout (mounted at /repo below) so an in-app agent can dogfood the
      # platform on its own source. Dev-only — never set in prod/test/CI.
      # See src/db/seed-self-project.ts.
      - EZCORP_SELF_PROJECT_PATH=/repo
      # Root-run git against the host-uid-owned /repo trips git's
      # dubious-ownership check — safe.directory clears it. The identity
      # entries make any future in-container commit attributable. GIT_CONFIG_*
      # env survives every spawn path (chat shell tool, extension runners).
      - GIT_CONFIG_COUNT=3
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/repo
      - GIT_CONFIG_KEY_1=user.name
      - GIT_CONFIG_VALUE_1=${EZCORP_GIT_NAME:-EZCorp Dev}
      - GIT_CONFIG_KEY_2=user.email
      - GIT_CONFIG_VALUE_2=${EZCORP_GIT_EMAIL:-dev@ezcorp.local}
    command:
      - sh
      - -c
      - |
        # Reconcile deps with the committed lockfile BEFORE anything else.
        # node_modules is baked into the dev image (it is NOT bind-mounted),
        # so when a merged PR advances bun.lock — e.g. the pi-ai 0.79→0.80
        # bump that moved imports to the new `@earendil-works/pi-ai/compat`
        # subpath — the running image keeps serving the OLD deps against the
        # freshly bind-mounted ./src. Vite then can't resolve the new subpath
        # and every route 500s with a cryptic "Missing ./compat specifier".
        # The manifests + lockfiles are bind-mounted read-only below, so this
        # install sees the CURRENT committed versions; on an up-to-date image
        # Bun verifies the install and exits fast (no-op). --ignore-scripts
        # mirrors Dockerfile.dev (dev runs raw .ts via Bun's "bun" export
        # condition — no dist/ build needed). Must run before the seed step,
        # which imports app code that transitively imports pi-ai.
        echo "Reconciling dependencies with lockfile..."
        bun install --frozen-lockfile --ignore-scripts
        (cd web && bun install --frozen-lockfile --ignore-scripts)
        if [ ! -f /app/state/.seeded ]; then
          echo "Seeding database..."
          bun src/db/seed-marketplace.ts && touch /app/state/.seeded
          echo "Seeding complete."
        else
          echo "Database already seeded, skipping."
        fi
        cd web && bunx svelte-kit sync && cd ..
        exec bun run dev -- --port 3000
    volumes:
      - testenv-state:/app/state
      - model-cache:/app/cache
      # Persist extension-generated files (openai-image-gen-2 writes PNG/WEBP
      # here; rehydrator reads them back on subsequent turns so the model
      # can describe/edit prior images). The dev server runs with
      # cwd=/app/web (see `cd web && bun run dev` above), so
      # saveImageToDisk resolves <cwd>/.ezcorp/ to this path. Without the
      # mount, every container restart wipes the images and the tool-card
      # URLs 404 silently.
      - ext-data:/app/web/.ezcorp
      # Scoped host bind mounts layered ON TOP of the ext-data volume
      # above: authored/installed extensions and their persistent
      # extension-data land in the host tree at ./.ezcorp/ so they're
      # editable/inspectable from the host (the volume only ever exposed
      # them at /var/lib/docker/volumes/ez-corp-ai_ext-data/_data). The
      # daemon `.pid` files stay volume-backed (NOT bound) on purpose —
      # sharing them across the host/container PID namespace would cause
      # false "daemon already running" detection. `.ezcorp/` is
      # gitignored. Container runs as root, so host-side files it creates
      # here are root-owned (sudo to manage from the host).
      - ./.ezcorp/extensions:/app/web/.ezcorp/extensions
      - ./.ezcorp/extension-data:/app/web/.ezcorp/extension-data
      # NOTE: a `./.env.seed:/app/.env.seed:ro` bind mount used to live
      # here so re-seeds could restore OAuth tokens. It's gitignored,
      # so on fresh clones Docker created an empty directory at the
      # host path and the seed step crashed reading it as a file. If
      # you actually rely on the seed-restore flow, re-add the line
      # locally — the seed script (src/db/seed-marketplace.ts) no-ops
      # cleanly when the file is absent.
      # Dependency manifests + lockfiles, read-only. Bind-mounting these lets
      # the boot-time `bun install --frozen-lockfile` (see command: above)
      # reconcile the image's baked node_modules against the CURRENT committed
      # lockfile. Without them the container would only ever see the lockfile
      # snapshot baked at image-build time and silently run stale deps against
      # newer bind-mounted source. :ro is safe — --frozen-lockfile never
      # rewrites the lockfile (it fails loudly if the manifests disagree).
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - ./web/package.json:/app/web/package.json:ro
      - ./web/bun.lock:/app/web/bun.lock:ro
      # Workspace manifests must match the lockfile for `workspace:*` to
      # resolve during the frozen install (same set Dockerfile.dev COPYs).
      - ./packages/@ezcorp/sdk/package.json:/app/packages/@ezcorp/sdk/package.json:ro
      - ./packages/@ezcorp/ai-kit/package.json:/app/packages/@ezcorp/ai-kit/package.json:ro
      - ./packages/@ezcorp/harness-client/package.json:/app/packages/@ezcorp/harness-client/package.json:ro
      # Mount source for live reload (Vite HMR)
      - ./src:/app/src
      - ./web/src:/app/web/src
      - ./web/static:/app/web/static
      - ./web/svelte.config.js:/app/web/svelte.config.js
      - ./web/vite.config.ts:/app/web/vite.config.ts
      - ./web/tsconfig.json:/app/web/tsconfig.json
      - ./docs:/app/docs
      # SDK source must ride the same live-reload set: extension
      # subprocesses resolve the workspace SDK through its "bun" exports
      # condition to packages/@ezcorp/sdk/src/*.ts, so without this
      # mount they run the image-baked SDK snapshot against bind-mounted
      # CURRENT extension/host code. That skew crashed every extension
      # importing an SDK export newer than the image (auto-disabled
      # after 3 crashes → its hub page 404s).
      - ./packages/@ezcorp/sdk/src:/app/packages/@ezcorp/sdk/src
      # User-created projects — accessible on host at ./projects/
      - ./projects:/app/projects
      # ── Self-modification project (EZCORP_SELF_PROJECT_PATH) ─────────
      # Whole checkout rw, including everything the scoped mounts above
      # don't cover. Shares inodes with ./src and ./web/src, so agent edits
      # write through to the host tree and Vite HMR fires unchanged. The
      # container runs as root, so files the agent CREATES here land
      # root-owned on the host (same caveat as .ezcorp above); edits to
      # EXISTING files keep their owner.
      - .:/repo
      # Read-only .git: git diff/log/status work for agent context, but
      # commits/branches/stashes fail with EROFS — keeps root-owned
      # objects/refs out of the host repo. Committing is a host-side action.
      - ./.git:/repo/.git:ro
      # Secret masks. Files use /dev/null binds (tmpfs can't mask a single
      # file); dirs use the tmpfs list below. ./.ezcorp holds the PROD
      # stack's live PGlite DB + keys; .env* hold deploy secrets. On hosts
      # where a mask target doesn't exist, docker creates an empty
      # root-owned file/dir at the host path (gitignored, harmless).
      - /dev/null:/repo/.env:ro
      - /dev/null:/repo/.env.prod:ro
      - /dev/null:/repo/.env.seed:ro
    tmpfs:
      # Mask the prod DB/keys dir and the multi-GB agent-scratch worktrees
      # out of /repo (mounts nest by target-path depth — same mechanism as
      # the .ezcorp bind-over-volume layering above).
      - /repo/.ezcorp
      - /repo/worktrees
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Zero-setup web search backend for the bundled web-search extension.
  # Always-on with hard resource caps (user decision 2026-06-12): an
  # on-demand spin-up was rejected because it needs docker.sock exposure
  # to save ~140 MB idle RAM. The app falls back to keyless DuckDuckGo
  # if this service is down, so it is NOT a hard dependency (no
  # depends_on). The port publishes on loopback ONLY — the app reaches
  # it via host networking; nothing off-host can.
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:8889:8080"
    volumes:
      # Committed config enabling the JSON API (off upstream by default)
      # and disabling the bot limiter (internal-only service).
      - ./deploy/searxng:/etc/searxng:ro
    environment:
      # The image maps SEARXNG_SECRET onto server.secret_key — the real
      # secret never lives in the committed settings.yml. The dev default
      # is fine because the port is loopback-only.
      - SEARXNG_SECRET=${SEARXNG_SECRET:-dev-only-secret}

  # Local suggestion model for the composer's prompt-enhancement row.
  # Same optional-sidecar contract as searxng: always-on with hard resource
  # caps, loopback-only port, and deliberately NO depends_on — the app falls
  # back (tool chips stay embedding-only, the ✨ row hides) whenever this
  # service is down or removed. Model weights persist in the named volume,
  # so the ~1GB download happens once.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    mem_limit: 4g
    cpus: 4
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # One-shot puller: fetches the suggestion model on first `up`, then exits
  # (restart "no"). Idempotent — `ollama pull` no-ops when the tag is
  # already current in the shared volume.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${EZCORP_SUGGEST_MODEL:-qwen3:1.7b}"]

volumes:
  testenv-pgdata:
  testenv-state:
  model-cache:
  ext-data:
  ollama-models:

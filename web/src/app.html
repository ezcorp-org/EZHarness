<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
		<meta name="theme-color" content="#111827" />
		<meta name="color-scheme" content="dark" />
		<link rel="manifest" href="/manifest.json" />
		<script>
			(() => {
				var t = localStorage.getItem('ezcorp-theme');
				var isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
				// Theme-aware splash bg — the splash paints before hydration removes
				// it, so without this it flashes dark on a light theme every reopen.
				document.documentElement.style.setProperty('--splash-bg', isDark ? '#111827' : '#ffffff');
				if (isDark) {
					document.documentElement.classList.add('dark');
				} else {
					document.querySelector('meta[name="color-scheme"]').content = 'light';
					document.querySelector('meta[name="theme-color"]').content = '#ffffff';
				}
			})();
		</script>
		<link rel="icon" href="/favicon.ico?v=1" sizes="any" />
		<link rel="icon" type="image/png" href="/favicon-192.png?v=1" sizes="192x192" />
		<link rel="apple-touch-icon" href="/favicon-192.png?v=1" />
		<title>EZCorp | AI Platform</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--splash-bg,#111827);z-index:9999;transition:opacity 0.3s ease-out">
			<img src="/logo.svg" alt="EZCorp" width="64" height="64" style="animation:splash-pulse 1.5s ease-in-out infinite" />
		</div>
		<style>
			@keyframes splash-pulse { 0%,100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
		</style>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

name: demo-deterministic
description: >-
  Zero-LLM workflow. A transform reshapes the input via template interpolation,
  then a gate asserts the composed fields. Being a pure function of its input,
  it produces byte-identical output on every run with the same input.
inputSchema:
  topic:
    type: string
    label: Topic
    description: The subject the report is composed around.
    required: true
    default: workflows
steps:
  - name: compose
    kind: transform
    output:
      slug: "{{$input.topic}}-report"
      headline: "Report on {{$input.topic}}"
  - name: assert-composed
    kind: gate
    # Explicit dependency: once any step declares `dependsOn` the executor
    # switches to topological batching, so pin the order that the no-dep
    # sequential path used to give (compose → assert → publish).
    dependsOn:
      - compose
    condition:
      all:
        - ref: "$steps.compose.output.headline"
          op: contains
          value: "Report on"
        - ref: "$steps.compose.output.slug"
          op: exists
  - name: publish
    kind: transform
    # Runs after the gate so the workflow's final result carries the composed
    # object (not the gate's bare `{ passed: true }`), giving the
    # reproducibility check meaningful content to byte-compare.
    dependsOn:
      - assert-composed
    output:
      slug: "$steps.compose.output.slug"
      headline: "$steps.compose.output.headline"

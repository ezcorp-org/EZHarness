services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      CI: "1"
      EZCORP_DB_PATH: ":memory:"
      PI_SKIP_INIT: "1"
    mem_limit: 4g

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ezcorp_test
      POSTGRES_USER: ezcorp
      POSTGRES_PASSWORD: ezcorp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezcorp"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - integration
